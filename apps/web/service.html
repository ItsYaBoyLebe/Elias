<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service – Elias Nijs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="service">

  <nav id="main-nav" class="site-nav"></nav>

  <header class="page-hero">
    <div class="container">
      <span class="eyebrow" data-i18n="service.heroSubtitle"></span>
      <h1 data-i18n="service.heroTitle"></h1>
    </div>
  </header>

  <section class="bg-surface">
    <div class="container">
      <div class="section-head">
        <span class="eyebrow" data-i18n="nav.service"></span>
        <h2 data-i18n="service.machineryTitle"></h2>
      </div>
      <p class="service-intro" data-i18n="service.machineryIntro"></p>
      <div class="service-grid" id="machinery-grid"></div>
    </div>
  </section>

  <section id="oldtimers">
    <div class="container">
      <div class="section-head">
        <span class="eyebrow" data-i18n="service.oldtimerEyebrow"></span>
        <h2 data-i18n="service.oldtimerTitle"></h2>
      </div>
      <p class="service-intro" data-i18n="service.oldtimerIntro"></p>
      <div class="service-grid" id="oldtimer-grid"></div>
      <div class="quote-block">
        <p><span class="quote-mark">“</span><span data-i18n="service.oldtimerQuote"></span></p>
      </div>
    </div>
  </section>

  <section class="cta-strip">
    <div class="container">
      <h2 data-i18n="cta.title"></h2>
      <p data-i18n="cta.body"></p>
      <a class="btn btn-ghost" href="contact.html" data-i18n="cta.button"></a>
    </div>
  </section>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="data/config.js"></script>
  <script src="data/translations.js"></script>
  <script src="data/products.js"></script>
  <script src="data/services.js"></script>
  <script src="script.js"></script>
</body>
</html>
