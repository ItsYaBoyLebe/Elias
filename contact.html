<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>Contact – Elias Nijs</title>
  <meta name="description" content="Neem contact op met Elias Nijs voor machines, service of oldtimer projecten." />
  <!-- Open Graph -->
  <meta property="og:type"              content="website" />
  <meta property="og:site_name"         content="Elias Nijs" />
  <meta property="og:url"               content="https://eliasnijs.be/contact.html" />
  <meta property="og:title"             content="Contact – Elias Nijs" />
  <meta property="og:description"       content="Neem contact op met Elias Nijs voor machines, service of oldtimer projecten." />
  <meta property="og:image"             content="https://eliasnijs.be/assets/img/elias.jpg" />
  <meta property="og:locale"            content="nl_BE" />
  <meta property="og:locale:alternate"  content="en_GB" />
  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Contact – Elias Nijs" />
  <meta name="twitter:description" content="Neem contact op met Elias Nijs voor machines, service of oldtimer projecten." />
  <meta name="twitter:image"       content="https://eliasnijs.be/assets/img/elias.jpg" />
  <!-- Canonical -->
  <link rel="canonical" href="https://eliasnijs.be/contact.html" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="contact">

  <nav id="main-nav" class="site-nav"></nav>

  <header class="page-hero">
    <div class="container">
      <span class="eyebrow" data-i18n="contact.heroSubtitle"></span>
      <h1 data-i18n="contact.heroTitle"></h1>
    </div>
  </header>

  <section>
    <div class="container">
      <p class="service-intro" data-i18n="contact.intro"></p>

      <div class="contact-layout">
        <aside class="contact-details" id="contact-details"></aside>

        <div class="contact-form">
          <h3 data-i18n="contact.formTitle"></h3>
          <div class="form-success"></div>
          <form id="contact-form" novalidate>
            <!-- Honeypot: hidden from people, bots fill it in and get rejected -->
            <input type="checkbox" name="botcheck" class="hidden" style="display:none" tabindex="-1" autocomplete="off" />
            <div class="form-field">
              <label for="cf-name" data-i18n="contact.formName"></label>
              <input id="cf-name" type="text" name="name" required />
            </div>
            <div class="form-field">
              <label for="cf-email" data-i18n="contact.formEmail"></label>
              <input id="cf-email" type="email" name="email" required />
            </div>
            <div class="form-field">
              <label for="cf-phone" data-i18n="contact.formPhone"></label>
              <input id="cf-phone" type="tel" name="phone" />
            </div>
            <div class="form-field">
              <label for="cf-message" data-i18n="contact.formMessage"></label>
              <textarea id="cf-message" name="message" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit" data-i18n="contact.formSubmit"></button>
          </form>
        </div>
      </div>

      <div class="map-block" id="map-block"></div>
    </div>
  </section>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="data/config.js"></script>
  <script src="data/translations.js"></script>
  <script src="data/services.js"></script>
  <script src="script.js"></script>
</body>
</html>
